<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Core SEO Meta Tags -->
    <title>AURA CINEMATIC | Award-Winning Documentary Production Company</title>
    <meta name="description" content="AURA CINEMATIC is a premium, award-winning independent documentary production company. We produce high-fidelity non-fiction films, docu-series, and music chronicles with deep artistic integrity and visual perfection." />
    <meta name="keywords" content="documentary production company, award-winning documentaries, music films, cinema verite, independent filmmaking studio, London Tokyo co-production, AURA films" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://auracinematic.com" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://auracinematic.com" />
    <meta property="og:title" content="AURA CINEMATIC | Award-Winning Documentary Production Company" />
    <meta property="og:description" content="We capture the raw truth and human essence of a changing world. Explore our award-winning documentary portfolio, music films, and co-productions." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1200&auto=format&fit=crop" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://auracinematic.com" />
    <meta name="twitter:title" content="AURA CINEMATIC | Documentary Production Portfolio" />
    <meta name="twitter:description" content="Producing premium, independent, non-fiction films with artistic vision, technical precision, and meticulous narrative flow." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1200&auto=format&fit=crop" />

    <!-- Structured Data JSON-LD for Organization & MovieTheatre -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MovieCreationSystem",
        "name": "Aura Cinematic",
        "alternateName": "Aura Films",
        "description": "An award-winning independent documentary film production company based in London and Tokyo.",
        "url": "https://auracinematic.com",
        "logo": "https://auracinematic.com/logo.jpg",
        "foundingDate": "2012",
        "founders": [
          {
            "@type": "Person",
            "name": "Elena Rostova"
          },
          {
            "@type": "Person",
            "name": "Kenji Tanaka"
          }
        ],
        "address": [
          {
            "@type": "PostalAddress",
            "streetAddress": "12 Golden Square, Soho",
            "addressLocality": "London",
            "postalCode": "W1F 9JE",
            "addressCountry": "UK"
          },
          {
            "@type": "PostalAddress",
            "streetAddress": "5-chōme-2 Shibuya",
            "addressLocality": "Tokyo",
            "postalCode": "150-0002",
            "addressCountry": "Japan"
          }
        ],
        "sameAs": [
          "https://instagram.com",
          "https://vimeo.com",
          "https://twitter.com"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
